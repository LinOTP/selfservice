<div class="{{'alert ' + type}}" role="alert">
  <div class="me-2">
    <ng-container [ngSwitch]="type">
      <mat-icon *ngSwitchCase="'error'">error</mat-icon>
      <mat-icon *ngSwitchCase="'info'">info</mat-icon>
      <mat-icon *ngSwitchDefault>warning</mat-icon>
    </ng-container>
  </div>

  <ng-container *ngIf="template; else stringTpl"
                [ngTemplateOutlet]="template">
  </ng-container>

  <ng-template #stringTpl>{{ text }}</ng-template>
</div>
